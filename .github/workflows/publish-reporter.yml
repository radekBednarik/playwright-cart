name: Publish Reporter to NPM packages 

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.com'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build reporter
        run: pnpm --filter ./packages/reporter build

      - name: Publish
        working-directory: packages/reporter
        run: npm publish

      - name: Printout npm logs
        if: always()
        run: |
            ls -la ~/.npm/_logs || true
            for file in ~/.npm/_logs/*; do
              [ -f "$file" ] || continue
              echo "Contents of $file:"
              cat "$file"
            done
