server {
  listen 80;
  listen [::]:80;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  # SPA fallback — all unmatched routes serve index.html
  location / {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;
    try_files $uri $uri/ /index.html;
  }

  # SSE endpoint — disable buffering so events reach clients immediately
  location /api/events {
    proxy_pass http://server:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
  }

  # Proxy API requests to the server container
  location /api/ {
    proxy_pass http://server:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 100m;
  }

  # Proxy report static files to the server container.
  # Range requests must pass through for the trace viewer's HttpRangeReader.
  # Buffering is disabled because HTML reports can be many MB; streaming avoids
  # spilling to a temp file and works fine since browsers consume the response immediately.
  location /reports/ {
    proxy_pass http://server:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Range $http_range;
    proxy_set_header If-Range $http_if_range;
    proxy_buffering off;
  }
}
