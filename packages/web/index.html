<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Playwright Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        var storageKey = 'playwright-cart.theme'
        var legacyKey = 'theme'
        var stored = localStorage.getItem(storageKey)
        var legacy = null
        if (stored !== 'dark' && stored !== 'light') {
          legacy = localStorage.getItem(legacyKey)
          if (legacy === 'dark' || legacy === 'light') {
            stored = legacy
            localStorage.setItem(storageKey, legacy)
            localStorage.removeItem(legacyKey)
          }
        }
        var theme = stored === 'dark' || stored === 'light'
          ? stored
          : window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
