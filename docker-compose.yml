services:
  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - reports_data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "${PORT:-3001}"
      DATA_DIR: "${DATA_DIR:-/app/data}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/runs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  reports_data:
